name: Latest blog post workflow
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-readme-with-blog:
    name: Update README with Hashnode Posts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug RSS (see actual HTTP status)
        run: |
          set -x
          curl -I "https://tiff-explores.hashnode.dev/rss.xml" || true
          curl -I -H "User-Agent: Mozilla/5.0" "https://tiff-explores.hashnode.dev/rss.xml" || true

      - name: Download RSS with browser User-Agent
        run: |
          curl -fsSL \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36" \
            -H "Accept: application/rss+xml,application/xml;q=0.9,*/*;q=0.8" \
            "https://tiff-explores.hashnode.dev/rss.xml" \
            -o rss.xml

      - name: Pull in posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "file://./rss.xml"
          max_post_count: 5
